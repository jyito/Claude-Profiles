name: CI (macOS)

# The real applet/osacompile/sips layer the Linux suite can't exercise.
# Smart-limited to conserve private-repo macOS minutes (which bill 10x):
# every PR to main, a weekly cron, and on release (via workflow_call).
# Single macos-latest on PRs; the full version matrix on cron/release.
# When the repo goes public, add `push: { branches: [main] }` here — Actions
# are then free/unlimited.
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-macos-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  matrix:
    name: pick matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      os: ${{ steps.pick.outputs.os }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'os=["macos-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'os=["macos-13","macos-14","macos-15"]' >> "$GITHUB_OUTPUT"
          fi

  macos:
    name: macos
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.matrix.outputs.os) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      # harden-runner is Linux-only, so it's intentionally omitted on macOS.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: test suite
        run: bash tests/run-tests.sh
      - name: regenerate icon (sips reads SVG natively)
        run: bash scripts/make-icon.sh
      - name: build (app + DMG + zip)
        run: bash scripts/build.sh
      - name: applescript osacompile parse-check
        run: |
          set -euo pipefail
          for f in src/dashboard.applescript src/badge-icon.applescript; do
            base=$(basename "$f")
            sed 's|__RESOURCES__|/tmp/fake-resources|g' "$f" > "/tmp/$base"
            osacompile -o "/tmp/${base%.applescript}.app" "/tmp/$base"
            echo "compiled $f"
          done
