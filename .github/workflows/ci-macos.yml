name: CI (macOS)

# The real applet/osacompile/sips layer the Linux suite can't exercise.
# Smart-limited to conserve private-repo macOS minutes (which bill 10x):
# every PR to main, a weekly cron, and on release (via workflow_call).
# Single macos-latest on PRs; the full version matrix on cron/release.
# When the repo goes public, add `push: { branches: [main] }` here — Actions
# are then free/unlimited.
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-macos-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  matrix:
    name: pick matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      os: ${{ steps.pick.outputs.os }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - id: pick
        run: |
          # PR: one runner (fast feedback). Release (workflow_call → inherits the
          # tag-push event): macos-14 + macos-15 — NOT macos-13, whose runners
          # queue for long stretches and have repeatedly stalled releases. The
          # weekly cron still exercises the full matrix incl. macos-13, where a
          # slow runner blocks nothing.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'os=["macos-latest"]' >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo 'os=["macos-13","macos-14","macos-15"]' >> "$GITHUB_OUTPUT"
          else
            echo 'os=["macos-14","macos-15"]' >> "$GITHUB_OUTPUT"
          fi

  macos:
    name: macos
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.matrix.outputs.os) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      # harden-runner is Linux-only, so it's intentionally omitted on macOS.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: pin Command Line Tools toolchain
        run: |
          # Mirror the maintainer's no-Xcode setup so CI fails the way a CLT-only
          # contributor would. Best-effort: if standalone CLT isn't present, fall
          # back to the runner's default toolchain (the source is identical).
          sudo xcode-select -s /Library/Developer/CommandLineTools 2>/dev/null \
            || echo "standalone CLT not present; using default toolchain"
          swift --version
      - name: cache SwiftPM build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            app/.build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ matrix.os }}-spm-${{ hashFiles('app/Package.swift') }}
          restore-keys: ${{ runner.os }}-${{ matrix.os }}-spm-
      - name: swift build (app + core, no Xcode)
        run: cd app && swift build
      - name: layer 1 — logic tests
        run: cd app && swift run ProfilesCoreTests
      - name: layer 2 — snapshot render proof
        run: cd app && swift run ProfilesSnapshotTests
      - name: test suite
        run: bash tests/run-tests.sh
      - name: regenerate icon (sips reads SVG natively)
        run: bash scripts/make-icon.sh
      - name: build (app + DMG + zip)
        run: bash scripts/build.sh
      - name: badge-icon osacompile parse-check
        run: |
          set -euo pipefail
          # The icon compositor engine.sh shells out to is the one AppleScript
          # left after the SwiftUI cutover; parse-check it on real macOS.
          f=src/badge-icon.applescript
          sed 's|__RESOURCES__|/tmp/fake-resources|g' "$f" > /tmp/badge-icon.applescript
          osacompile -o /tmp/badge-icon.app /tmp/badge-icon.applescript
          echo "compiled $f"
