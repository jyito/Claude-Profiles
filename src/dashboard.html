<!DOCTYPE html>
<html><!-- Copyright 2026 jyito — Apache-2.0; see LICENSE and NOTICE --><head><meta charset="utf-8"><title>Claude Profiles</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1A1915; color:#F1EFE8; font:14px/1.5 -apple-system, "SF Pro Text", Helvetica, sans-serif;
         -webkit-user-select:none; cursor:default; padding:18px 16px; }
  .top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; }
  .kpi-label { font-size:12px; color:#888780; margin-bottom:2px; }
  .kpi { font-size:26px; font-weight:500; }
  .kpi small { font-size:14px; color:#888780; font-weight:400; }
  .btn-add { background:#D85A30; color:#FAECE7; border:none; border-radius:8px; padding:8px 14px;
             font-size:13px; cursor:pointer; font-family:inherit; }
  .btn-add:active { transform:scale(.98); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:12px; }
  .card { background:#21201A; border:.5px solid #2e2c25; border-radius:10px; padding:14px; }
  .hdr { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .avatar { width:34px; height:34px; border-radius:9px; display:flex; align-items:center;
            justify-content:center; font-weight:500; font-size:14px; flex:none; }
  .name { font-size:14px; font-weight:500; }
  .sub { font-size:12px; color:#888780; display:flex; align-items:center; gap:5px; }
  .sub.on { color:#5DCAA5; }
  .dot { width:7px; height:7px; border-radius:50%; background:#5F5E5A; display:inline-block; flex:none; }
  .on .dot { background:#5DCAA5; }
  .charts { display:flex; gap:14px; margin-bottom:10px; }
  .charts > div { flex:1; }
  .ml { font-size:11px; color:#888780; }
  .acts { display:flex; gap:8px; }
  .acts button { flex:1; background:transparent; border:.5px solid #3a382f; color:#D3D1C7; border-radius:7px;
                 padding:6px 0; font-size:12px; cursor:pointer; font-family:inherit; }
  .acts button.primary { background:#2A4A3E; border:none; color:#9FE1CB; }
  .acts button:active { transform:scale(.98); }
  .meta { font-size:12px; color:#888780; margin-bottom:10px; padding:6px 0; }
  .toast { position:sticky; top:0; font-size:12px; color:#9FE1CB; margin-bottom:8px; min-height:16px; }
  .scrim { position:fixed; inset:0; background:rgba(10,9,7,.6); display:none;
           align-items:center; justify-content:center; z-index:10; }
  .scrim.show { display:flex; }
  .modal { background:#21201A; border:.5px solid #3a382f; border-radius:14px; padding:22px;
           width:400px; max-width:calc(100vw - 48px); }
  .modal h2 { font-size:16px; font-weight:500; margin:0 0 4px; }
  .modal p { font-size:12px; color:#888780; margin:0 0 14px; }
  .modal input { width:100%; box-sizing:border-box; background:#1A1915; border:.5px solid #3a382f;
                 color:#F1EFE8; border-radius:8px; padding:10px 12px; font-size:13px;
                 font-family:inherit; outline:none; margin-bottom:14px; }
  .modal input:focus { border-color:#D85A30; }
  .modal .row { display:flex; gap:8px; justify-content:flex-end; }
  .modal button { border-radius:8px; padding:8px 16px; font-size:13px; cursor:pointer; font-family:inherit; }
  .modal .go { background:#D85A30; color:#FAECE7; border:none; }
  .modal .ghost { background:transparent; border:.5px solid #3a382f; color:#D3D1C7; }
  .cleanrow { display:block; width:100%; text-align:left; background:#1A1915; border:.5px solid #3a382f;
              border-radius:10px; padding:12px 14px; margin-bottom:10px; cursor:pointer; font-family:inherit; }
  .cleanrow .t { font-size:13px; font-weight:500; color:#F1EFE8; }
  .cleanrow .d { font-size:11px; color:#888780; margin-top:2px; }
  .cleanrow:hover { border-color:#5F5E5A; }
  .cleanrow.danger { background:#2A1210; border-color:#712B13; }
  .cleanrow.danger .t { color:#F0997B; }
  .cleanrow.danger:hover { border-color:#D85A30; }
  .cleanrow.armed { background:#501313; border-color:#E24B4A; }
  .cleanrow.armed .t { color:#F7C1C1; }
  .btn-ghost { background:transparent; color:#D3D1C7; border:.5px solid #3a382f; border-radius:8px;
               padding:8px 14px; font-size:13px; cursor:pointer; font-family:inherit; margin-right:8px; }
  .linkbtn { background:none; border:none; color:#888780; font-size:11px; cursor:pointer;
             font-family:inherit; padding:6px 0 0; text-align:center; width:100%; }
  .linkbtn:hover { color:#E24B4A; }
  .confirm { font-size:12px; color:#D3D1C7; line-height:1.5; }
  .confirm input { width:100%; background:#1A1915; border:.5px solid #3a382f; color:#F1EFE8; border-radius:7px;
                   padding:6px 10px; font-size:12px; font-family:inherit; outline:none; margin:8px 0; }
  .confirm .danger { background:#501313; color:#F7C1C1; border:none; }
  .card.expanded { grid-column:1 / -1; }
  .expander { background:none; border:none; color:#888780; font-size:11px; cursor:pointer;
              font-family:inherit; padding:8px 0 0; width:100%; text-align:center; }
  .expander:hover { color:#D3D1C7; }
  .drill { margin-top:12px; border-top:.5px solid #2e2c25; padding-top:12px; }
  .drill h4 { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:#888780;
              font-weight:500; margin:0 0 8px; }
  .tterm { width:100%; border-collapse:collapse; font-size:12px; }
  .tterm th { text-align:left; color:#888780; font-weight:400; font-size:11px;
              padding:4px 8px; border-bottom:.5px solid #2e2c25; }
  .tterm td { padding:5px 8px; border-bottom:.5px solid #211f19; vertical-align:top; }
  .tterm td.dev { color:#9FE1CB; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .tterm td.cmd { color:#D3D1C7; font-family:"SF Mono", ui-monospace, monospace; font-size:11px; word-break:break-all; }
  .tterm td.idle { color:#888780; white-space:nowrap; text-align:right; }
  .drill .empty { color:#888780; font-size:12px; padding:6px 0; }
</style></head><body>
<div class="top">
  <div>
    <div class="kpi-label">Total memory in use</div>
    <div class="kpi" id="kpi">—</div>
  </div>
  <div><button class="btn-ghost" onclick="toggleClean(true)">Cleanup</button><button class="btn-add" onclick="toggleNp(true)">＋ New Profile</button></div>
</div>
<div class="toast" id="toast"></div>
<div class="scrim" id="npmodal" onclick="if(event.target===this)toggleNp(false)">
  <div class="modal">
    <h2>New profile</h2>
    <p>A separate Claude app with its own account, permanently signed in after the first launch.</p>
    <input id="npname" placeholder="Profile name — e.g. Personal, Client X" maxlength="40"
           onkeydown="if(event.key==='Enter')createProfile()">
    <div class="row">
      <button class="ghost" onclick="toggleNp(false)">Cancel</button>
      <button class="go" onclick="createProfile()">Create Profile</button>
    </div>
  </div>
</div>
<div class="scrim" id="cleanmodal" onclick="if(event.target===this)toggleClean(false)">
  <div class="modal">
    <h2>Cleanup</h2>
    <p>Everything here is reversible where it counts: sign-ins and profile data are never touched.</p>
    <button class="cleanrow" onclick="act('quitall');toggleClean(false)">
      <div class="t">Quit all profiles</div>
      <div class="d">Politely closes every running profile instance. Your default Claude keeps running.</div>
    </button>
    <button class="cleanrow" onclick="act('cleanall');toggleClean(false)">
      <div class="t">Clear caches on stopped profiles</div>
      <div class="d">Frees disk by deleting regenerable caches. Running profiles are skipped automatically.</div>
    </button>
    <button class="cleanrow danger" id="ksw" onclick="killswitch()">
      <div class="t">Emergency Stop</div>
      <div class="d">Force-quits every Claude instance immediately, including the default — for when your machine is drowning. All sign-ins survive; everything reopens authenticated.</div>
    </button>
    <div class="row"><button class="ghost" onclick="toggleClean(false)">Close</button></div>
  </div>
</div>
<div class="grid" id="grid"></div>
<script>
var hist = {}, MAXPTS = 30, uiLock = false, confirmStep = {}, lastData = null;
var expanded = null, terminals = {};
function toggleExpand(slug) {
  if (expanded === slug) { expanded = null; }
  else { expanded = slug; act("terminals", slug); }   // ask the host for this profile's terminals
  rerender();
}
function updateTerminals(slug, arr) {   // pushed by the host after `engine terminals <slug>`
  terminals[slug] = arr;
  if (expanded === slug) rerender();
}
function fmtIdle(s) {
  if (s == null || s < 0) return "—";
  if (s < 60) return "active";
  var m = Math.floor(s / 60);
  if (m < 60) return m + "m idle";
  return Math.floor(m / 60) + "h " + (m % 60) + "m idle";
}
function esc(s) {
  return ("" + (s == null ? "" : s)).replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function drillPanel(slug) {
  var rows = terminals[slug];
  var h = '<div class="drill"><h4>Terminals — live sessions in this profile</h4>';
  if (!rows) return h + '<div class="empty">Loading…</div></div>';
  if (!rows.length) return h + '<div class="empty">No active terminals.</div></div>';
  h += '<table class="tterm"><tr><th>Device</th><th>Command</th><th>Idle</th></tr>';
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    h += '<tr><td class="dev">' + esc(r.dev.replace("/dev/", "")) + "</td>" +
         '<td class="cmd" title="' + esc(r.cmd) + '">' + esc(r.cmd) + "</td>" +
         '<td class="idle">' + fmtIdle(r.idle) + "</td></tr>";
  }
  return h + "</table></div>";
}
function toggleNp(show) {
  var f = document.getElementById("npmodal");
  if (show) { f.className = "scrim show"; uiLock = true; document.getElementById("npname").focus(); }
  else { f.className = "scrim"; document.getElementById("npname").value = ""; uiLock = false; rerender(); }
}
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    if (document.getElementById("npmodal").className.indexOf("show") > -1) toggleNp(false);
    else if (document.getElementById("cleanmodal").className.indexOf("show") > -1) toggleClean(false);
    else if (expanded) { expanded = null; rerender(); }
  }
});
var kswArmed = false, kswTimer = null;
function toggleClean(show) {
  var f = document.getElementById("cleanmodal");
  if (show) { f.className = "scrim show"; uiLock = true; }
  else { f.className = "scrim"; uiLock = false; disarmKsw(); rerender(); }
}
function disarmKsw() {
  kswArmed = false; if (kswTimer) clearTimeout(kswTimer);
  var k = document.getElementById("ksw");
  if (k) { k.className = "cleanrow danger";
    k.querySelector(".t").textContent = "Emergency Stop";
    k.querySelector(".d").textContent = "Force-quits every Claude instance immediately, including the default — for when your machine is drowning. All sign-ins survive; everything reopens authenticated."; }
}
function killswitch() {
  var k = document.getElementById("ksw");
  if (!kswArmed) {
    kswArmed = true;
    k.className = "cleanrow armed";
    k.querySelector(".t").textContent = "Click again to confirm Emergency Stop";
    k.querySelector(".d").textContent = "Kills every Claude process tree right now. Disarms in 3 seconds.";
    kswTimer = setTimeout(disarmKsw, 3000);
    return;
  }
  act("killswitch");
  toggleClean(false);
}
function createProfile() {
  var name = document.getElementById("npname").value.replace(/[":\\{}]/g, "").trim();
  if (!name) return;
  toggleNp(false);
  act("create", name);
}
function startRemove(slug)  { confirmStep[slug] = 1; uiLock = true; rerender(); }
function cancelRemove(slug) { delete confirmStep[slug]; uiLock = false; rerender(); }
function confirmRemove(slug) { act("remove", slug); confirmStep[slug] = 2; rerender(); }
function finishPurge(slug) {
  var v = (document.getElementById("purge-" + slug) || {value:""}).value;
  if (v === "DELETE") { act("purge", slug); }
  delete confirmStep[slug]; uiLock = false; rerender();
}
function rerender() { if (lastData) render(lastData); }
var AV = [["#712B13","#F5C4B3"],["#26215C","#CECBF6"],["#04342C","#9FE1CB"],["#4B1528","#F4C0D1"],["#042C53","#B5D4F4"]];
function act(a, slug) {
  document.title = "cp:" + a + (slug ? ":" + slug : "");
  var t = document.getElementById("toast");
  t.textContent = {create:"Creating profile…", open:"Launching…", focus:"Bringing windows forward…",
                   focusdefault:"Bringing windows forward…", opendefault:"Launching Claude…", quit:"Asking instance to quit…",
                   force:"Force quitting…", quitdefault:"Asking Claude to quit…", forcedefault:"Force quitting Claude…",
                   clean:"Clearing caches…", remove:"Removing app…", quitall:"Quitting all profiles…",
                   cleanall:"Clearing caches on stopped profiles…", killswitch:"EMERGENCY STOP — killing all Claude instances…",
                   purge:"Erasing saved login…"}[a] || "";
  setTimeout(function(){ t.textContent = ""; }, 2500);
}
function spark(arr, color) {
  if (arr.length < 2) return '<svg style="width:100%;height:22px"></svg>';
  var max = Math.max.apply(null, arr.concat([1])), pts = [];
  for (var i = 0; i < arr.length; i++)
    pts.push((i * (100 / (MAXPTS - 1))).toFixed(1) + "," + (20 - (arr[i] / max) * 16).toFixed(1));
  return '<svg viewBox="0 0 100 22" preserveAspectRatio="none" style="width:100%;height:22px">' +
         '<polyline points="' + pts.join(" ") + '" fill="none" stroke="' + color + '" stroke-width="2" ' +
         'vector-effect="non-scaling-stroke"/></svg>';
}
function updateStats(data) {
  lastData = data;
  if (uiLock) return;
  render(data);
}
function render(data) {
  var totalMem = 0, running = 0, html = "";
  for (var i = 0; i < data.length; i++) {
    var p = data[i], key = p.slug || "_default";
    if (!hist[key]) hist[key] = { cpu: [], mem: [] };
    hist[key].cpu.push(p.cpu); hist[key].mem.push(p.mem);
    if (hist[key].cpu.length > MAXPTS) { hist[key].cpu.shift(); hist[key].mem.shift(); }
    if (p.running) { totalMem += p.mem; running++; }
    var av = AV[i % AV.length];
    var initial = (p.slug ? p.name.replace(/^Claude /, "") : "C").charAt(0).toUpperCase();
    html += '<div class="card' + (expanded === p.slug ? " expanded" : "") + '"><div class="hdr">' +
      '<div class="avatar" style="background:' + av[0] + ';color:' + av[1] + '">' + initial + "</div>" +
      '<div style="flex:1"><div class="name">' + p.name.replace(/^Claude /, "").replace(/^\(/, "Claude (") + "</div>" +
      '<div class="sub' + (p.running ? " on" : "") + '"><span class="dot"></span>' +
      (p.running ? "Running · " + p.procs + " procs · " + p.ptys + " terminals"
                 : "Stopped" + (p.opens ? " · opened " + p.opens + "× · last " + p.last : "")) +
      "</div></div></div>";
    if (p.running) {
      html += '<div class="charts"><div><div class="ml">CPU ' + p.cpu.toFixed(1) + "%</div>" +
        spark(hist[key].cpu, "#F0997B") + '</div><div><div class="ml">Memory ' + Math.round(p.mem) + " MB</div>" +
        spark(hist[key].mem, "#9FE1CB") + "</div></div>";
    } else {
      html += '<div class="meta">' + (p.disk >= 0 ? "Disk " + (p.disk >= 1024 ? (p.disk/1024).toFixed(1) + " GB" : p.disk + " MB") : "") + "</div>";
    }
    html += '<div class="acts">';
    if (p.slug) {
      if (p.running) {
        html += '<button class="primary" onclick="act(\'focus\',\'' + p.slug + '\')">Show Window</button>' +
                '<button onclick="act(\'quit\',\'' + p.slug + '\')">Quit</button>' +
                '<button onclick="act(\'force\',\'' + p.slug + '\')">Force Quit</button>';
      } else if (confirmStep[p.slug] === 1) {
        html += '</div><div class="confirm">Remove the app “' + p.name + '”? Your saved login is kept.' +
          '<div class="acts" style="margin-top:8px">' +
          '<button class="danger" style="flex:1;border-radius:7px;padding:6px 0;font-size:12px;cursor:pointer" onclick="confirmRemove(\'' + p.slug + '\')">Remove App</button>' +
          '<button onclick="cancelRemove(\'' + p.slug + '\')">Cancel</button></div><div style="display:none">';
      } else if (confirmStep[p.slug] === 2) {
        html += '</div><div class="confirm">App removed. Erase the saved login and data too? Type DELETE to confirm, or Keep it for later.' +
          '<input id="purge-' + p.slug + '" placeholder="Type DELETE to erase permanently">' +
          '<div class="acts"><button class="danger" style="flex:1;border-radius:7px;padding:6px 0;font-size:12px;cursor:pointer" onclick="finishPurge(\'' + p.slug + '\')">Confirm</button>' +
          '<button onclick="delete confirmStep[\'' + p.slug + '\'];uiLock=false;rerender()">Keep Login</button></div><div style="display:none">';
      } else {
        html += '<button class="primary" onclick="act(\'open\',\'' + p.slug + '\')">Open</button>' +
                '<button onclick="act(\'clean\',\'' + p.slug + '\')">Clean Caches</button>';
      }
    } else {
      if (p.running) {
        html += '<button class="primary" onclick="act(\'focusdefault\')">Show Window</button>' +
                '<button onclick="act(\'quitdefault\')">Quit</button>' +
                '<button onclick="act(\'forcedefault\')">Force Quit</button>';
      } else {
        html += '<button class="primary" onclick="act(\'opendefault\')">Open</button>';
      }
    }
    html += "</div>";
    if (p.slug && p.running) {
      html += '<button class="expander" onclick="toggleExpand(\'' + p.slug + '\')">' +
              (expanded === p.slug ? "▴ Hide terminals" : "▾ Terminals" + (p.ptys ? " (" + p.ptys + ")" : "")) +
              "</button>";
      if (expanded === p.slug) html += drillPanel(p.slug);
    }
    if (p.slug && !p.running && !confirmStep[p.slug]) {
      html += '<button class="linkbtn" onclick="startRemove(\'' + p.slug + '\')">Remove profile…</button>';
    }
    html += "</div>";
  }
  document.getElementById("grid").innerHTML = html;
  document.getElementById("kpi").innerHTML = Math.round(totalMem).toLocaleString() +
    ' <small>MB across ' + running + " running</small>";
}
</script></body></html>
